<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMind · Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #0c0f15;
            color: #edf2fb;
            min-height: 100vh;
        }
        .app-wrapper {
            display: flex;
            min-height: 100vh;
        }
        /* Sol Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(8, 12, 20, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.06);
            padding: 28px 16px;
            display: flex;
            flex-direction: column;
        }
        .logo-area {
            padding-left: 12px;
            margin-bottom: 32px;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, #9bb1e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 14px;
            color: #b0c2da;
            margin-bottom: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .nav-item.active {
            background: #1e2a41;
            color: white;
        }
        .nav-item:hover {
            background: #1a2438;
        }
        .user-info {
            margin-top: auto;
            padding: 16px 12px;
            border-top: 1px solid #1f2a3c;
        }
        .user-email {
            font-size: 0.9rem;
            color: #b9c8e6;
            margin-bottom: 12px;
            word-break: break-all;
        }
        .logout-btn {
            background: transparent;
            border: 1.5px solid #354153;
            color: #d6e2ff;
            padding: 10px 16px;
            border-radius: 14px;
            width: 100%;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.15s;
        }
        .logout-btn:hover {
            background: #1e2a41;
        }
        /* Ana İçerik */
        .main-content {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .page-title {
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: -0.01em;
        }
        .add-section {
            background: #121a26;
            border-radius: 28px;
            padding: 24px 28px;
            margin-bottom: 36px;
            border: 1px solid #283241;
        }
        .input-row {
            display: flex;
            gap: 12px;
            max-width: 600px;
        }
        .input-row input {
            flex: 1;
            background: #0b1119;
            border: 1.5px solid #2e3c50;
            border-radius: 18px;
            padding: 16px 20px;
            font-size: 1rem;
            color: white;
            outline: none;
        }
        .input-row input:focus {
            border-color: #3b82f6;
        }
        .btn-primary {
            background: #2563eb;
            border: none;
            border-radius: 18px;
            padding: 0 28px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            border: 1px solid #3b82f6;
            transition: all 0.15s;
        }
        .btn-primary:hover {
            background: #1d4ed8;
        }
        .library-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .film-card {
            background: #111a26;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #253040;
            transition: transform 0.2s, box-shadow 0.2s;
            backdrop-filter: blur(4px);
            cursor: pointer;
        }
        .film-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -10px #00000055;
            border-color: #3e5670;
        }
        .film-title {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #e4ecff;
        }
        .film-dna {
            font-size: 0.8rem;
            color: #a2b5d4;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .rec-section {
            margin-top: 20px;
        }
        .rec-card {
            background: #0f1a28;
            border-radius: 28px;
            padding: 30px;
            border: 1px solid #2a3b50;
        }
        .rec-content {
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 1rem;
        }
        .status-badge {
            display: inline-block;
            margin-left: 16px;
            font-size: 0.9rem;
            color: #7f99c2;
        }
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #2563eb;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-message {
            color: #7f92b0;
            font-style: italic;
            padding: 12px 0;
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo-area">
            <span class="logo">CineMind</span>
        </div>
        <div class="nav-item active">
            <span>🏠</span> Ana Sayfa
        </div>
        <div class="nav-item">
            <span>🎬</span> Kütüphane
        </div>
        <div class="user-info">
            <div class="user-email" id="userEmail"></div>
            <button class="logout-btn" id="logoutBtn">Çıkış Yap</button>
        </div>
    </div>

    <!-- Ana İçerik -->
    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title">Sinematik Kütüphanen</h1>
            <span id="libCount" class="status-badge"></span>
        </div>

        <!-- Ekleme Alanı -->
        <div class="add-section">
            <div class="input-row">
                <input type="text" id="titleInput" placeholder="Film veya dizi adı (örn: Mindhunter, Dune) ...">
                <button class="btn-primary" id="addBtn">Analiz Et ve Ekle</button>
            </div>
            <div id="addStatus" style="margin-top: 14px; color: #a3bbdb;"></div>
        </div>

        <!-- Kütüphane Grid -->
        <div class="library-header">
            <h2 style="font-weight: 500;">📀 Favorilerin</h2>
            <button id="refreshLibBtn" style="background: none; border: 1px solid #31445e; color: #cbd9f0; padding: 8px 16px; border-radius: 30px; cursor: pointer;">🔄 Yenile</button>
        </div>
        <div class="library-grid" id="libraryGrid">
            <div class="empty-message">Henüz favori eklemedin.</div>
        </div>

        <!-- Öneri Bölümü -->
        <div class="rec-section">
            <div style="display: flex; align-items: center; margin-bottom: 18px;">
                <h2 style="font-weight: 500;">🔮 Sana Özel Öneriler</h2>
                <button class="btn-primary" id="recommendBtn" style="margin-left: 24px; padding: 10px 24px;">Öneri Al</button>
                <span id="recStatus" style="margin-left: 16px;"></span>
            </div>
            <div class="rec-card">
                <div class="rec-content" id="recommendationResult">
                    Profilini analiz etmek için "Öneri Al" butonuna tıkla.
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Firebase config (login.html ile aynı olmalı)
 const firebaseConfig = {
  apiKey: "AIzaSyA4sliX6WakLaE5mj1WsLliV8VOSDSY__w",
  authDomain: "cinemind-96f2c.firebaseapp.com",
  projectId: "cinemind-96f2c",
  storageBucket: "cinemind-96f2c.firebasestorage.app",
  messagingSenderId: "126711652018",
  appId: "1:126711652018:web:1ab75aaa549719b32973ab",
  measurementId: "G-VPXK2K1KMQ"
};

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    let currentUser = null;
    let idToken = null;

    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = '/';
            return;
        }
        currentUser = user;
        document.getElementById('userEmail').innerText = user.email;
        idToken = await user.getIdToken();
        loadLibrary();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        auth.signOut().then(() => window.location.href = '/');
    });

    async function apiCall(endpoint, method = 'GET', body = null) {
        if (!idToken) idToken = await auth.currentUser.getIdToken();
        const headers = {
            'Authorization': `Bearer ${idToken}`,
            'Content-Type': 'application/json'
        };
        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);
        const response = await fetch(endpoint, options);
        if (response.status === 401) {
            // Token expired
            idToken = await auth.currentUser.getIdToken(true);
            return apiCall(endpoint, method, body);
        }
        return response.json();
    }

    async function loadLibrary() {
        try {
            const data = await apiCall('/api/library');
            const grid = document.getElementById('libraryGrid');
            const countSpan = document.getElementById('libCount');
            if (!data.length) {
                grid.innerHTML = '<div class="empty-message">Henüz favori eklemedin.</div>';
                countSpan.innerText = '';
                return;
            }
            countSpan.innerText = `${data.length} eser`;
            let html = '';
            data.forEach(item => {
                html += `<div class="film-card" title="${item.dna.replace(/"/g, '&quot;')}">
                    <div class="film-title">${escapeHtml(item.title)}</div>
                    <div class="film-dna">${escapeHtml(item.dna.substring(0, 100))}…</div>
                </div>`;
            });
            grid.innerHTML = html;
        } catch (e) {
            console.error(e);
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    document.getElementById('refreshLibBtn').addEventListener('click', loadLibrary);

    document.getElementById('addBtn').addEventListener('click', async () => {
        const input = document.getElementById('titleInput');
        const title = input.value.trim();
        const status = document.getElementById('addStatus');
        if (!title) return;
        status.innerHTML = '<span class="loading-spinner"></span> İnternet taranıyor, DNA çıkarılıyor...';
        document.getElementById('addBtn').disabled = true;
        try {
            const res = await apiCall('/api/add', 'POST', { title });
            if (res.success) {
                status.innerText = `✅ "${res.title}" kütüphanene eklendi.`;
                input.value = '';
                await loadLibrary();
            } else {
                status.innerText = `❌ Hata: ${res.error}`;
            }
        } catch (e) {
            status.innerText = 'Bağlantı hatası.';
        } finally {
            document.getElementById('addBtn').disabled = false;
        }
    });

    document.getElementById('recommendBtn').addEventListener('click', async () => {
        const recStatus = document.getElementById('recStatus');
        const recResult = document.getElementById('recommendationResult');
        recStatus.innerHTML = '<span class="loading-spinner"></span> Qwen2.5 düşünüyor...';
        document.getElementById('recommendBtn').disabled = true;
        try {
            const res = await apiCall('/api/recommend');
            if (res.success) {
                recResult.innerText = res.recommendations;
                recStatus.innerHTML = '✅';
            } else {
                recResult.innerText = `Hata: ${res.error}`;
                recStatus.innerHTML = '❌';
            }
        } catch (e) {
            recResult.innerText = 'Bağlantı hatası.';
            recStatus.innerHTML = '❌';
        } finally {
            document.getElementById('recommendBtn').disabled = false;
            setTimeout(() => recStatus.innerHTML = '', 3000);
        }
    });

    // Enter ile ekleme
    document.getElementById('titleInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') document.getElementById('addBtn').click();
    });
</script>
</body>
</html>
